name: Build And Push Containers

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
  API_REPOSITORY: ${{ vars.ECR_API_REPOSITORY }}
  WEB_REPOSITORY: ${{ vars.ECR_WEB_REPOSITORY }}

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: server/Dockerfile
            repository: ${{ vars.ECR_API_REPOSITORY }}
          - service: web
            dockerfile: client/Dockerfile
            repository: ${{ vars.ECR_WEB_REPOSITORY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        if: github.event_name != 'pull_request'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Login to Amazon ECR
        if: github.event_name != 'pull_request'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tags
        id: meta
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            IMAGE_TAGS="${{ env.ECR_REGISTRY }}/${{ matrix.repository }}:latest,${{ env.ECR_REGISTRY }}/${{ matrix.repository }}:${SHORT_SHA}"
          else
            SAFE_REF="$(echo "${GITHUB_REF_NAME}" | tr '/_' '--')"
            IMAGE_TAGS="${{ env.ECR_REGISTRY }}/${{ matrix.repository }}:${SAFE_REF}-${SHORT_SHA}"
          fi
          echo "tags=${IMAGE_TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build image
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: local/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
